{% extends 'healthapp/base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4 py-12">
    <div class="w-full max-w-[450px] p-10 bg-[#121212]/80 backdrop-blur-2xl rounded-[32px] border border-white/5 shadow-2xl flex flex-col items-center">
        <!-- Icon -->
        <div class="mb-6 p-3 bg-white/5 rounded-2xl border border-white/10 text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-white tracking-tight text-center">Reset Password</h2>
        <p class="mt-2 text-sm text-gray-400 text-center">Enter your email address to reset your password.</p>

        <form class="mt-10 w-full space-y-5" method="POST">
            {% csrf_token %}
            <div class="space-y-2">
                <label for="id_email" class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Email Address</label>
                <input id="id_email" name="email" type="email" required
                    class="block w-full px-5 py-4 text-white bg-black/40 border border-white/10 rounded-2xl focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder-gray-600"
                    placeholder="Enter your email">
            </div>

            <button type="submit"
                class="w-full mt-4 py-4 text-lg font-black text-black bg-gradient-to-r from-emerald-400 to-teal-400 rounded-2xl hover:scale-[1.02] shadow-[0_0_20px_rgba(52,211,153,0.3)] transition-all">
                Send Reset Link →
            </button>
        </form>
    </div>
</div>
{% endblock %}
