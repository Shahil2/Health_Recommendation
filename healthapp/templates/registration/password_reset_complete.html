{% extends 'healthapp/base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4 py-12">
    <div class="w-full max-w-[450px] p-10 bg-[#121212]/80 backdrop-blur-2xl rounded-[32px] border border-white/5 shadow-2xl flex flex-col items-center">
        <!-- Icon -->
        <div class="mb-6 w-16 h-16 bg-gradient-to-br from-emerald-400 to-sky-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 text-black">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
        </div>

        <h2 class="text-3xl font-black text-white tracking-tight text-center mb-4">Password Reset!</h2>
        <p class="text-gray-400 text-center leading-relaxed">Your password has been set. You may go ahead and log in now with your new credentials.</p>
        
        <a href="{% url 'login' %}"
            class="w-full mt-8 py-4 text-center text-lg font-black text-black bg-gradient-to-r from-emerald-400 to-teal-400 rounded-2xl hover:scale-[1.02] shadow-[0_0_20px_rgba(52,211,153,0.3)] transition-all">
            Log In →
        </a>
    </div>
</div>
{% endblock %}
