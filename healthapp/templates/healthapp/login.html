{% extends 'healthapp/base.html' %}
{% block container_class %}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center relative px-4">
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-cover bg-center bg-fixed bg-no-repeat" style="background-image: url('https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?auto=format&fit=crop&q=80&w=2000');"></div>
        <!-- Dark Overlay -->
        <div class="absolute inset-0 bg-black/60"></div>
    </div>

    <!-- Login Form Card -->
    <div class="w-full max-w-[420px] p-10 bg-black/40 backdrop-blur-md rounded-[40px] border border-white/20 shadow-2xl relative z-10 my-10">
        <!-- Icon -->
        <div class="mb-8 w-16 h-16 bg-gradient-to-br from-emerald-400 to-sky-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 mx-auto text-black">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                <polyline points="10 17 15 12 10 7" />
                <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
        </div>

        <h2 class="text-3xl font-black text-white tracking-tight mb-2 text-center">Welcome Back</h2>
        <p class="text-sm text-gray-300 mb-10 text-center">Access your personalized health dashboard.</p>

        <form class="space-y-6" method="POST">
            {% csrf_token %}
            <div class="space-y-2">
                <label for="username" class="text-xs font-bold text-gray-300 uppercase tracking-widest ml-1">Username</label>
                <input id="username" name="username" type="text" required
                    class="block w-full px-5 py-4 text-white bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder-gray-400"
                    placeholder="Enter your username">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label for="password" class="text-xs font-bold text-gray-300 uppercase tracking-widest">Password</label>
                    <a href="{% url 'password_reset' %}" class="text-xs font-bold text-emerald-400 hover:text-emerald-300 transition-colors">Forgot Password?</a>
                </div>
                <input id="password" name="password" type="password" required
                    class="block w-full px-5 py-4 text-white bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder-gray-400"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full py-4 text-lg font-black text-black bg-gradient-to-r from-emerald-400 to-teal-400 rounded-2xl hover:scale-[1.02] shadow-[0_0_20px_rgba(52,211,153,0.3)] transition-all mt-4">
                Sign In →
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/20 text-center">
            <p class="text-sm text-gray-300">
                New to Smart Health?
                <a href="{% url 'signup' %}"
                    class="font-bold text-white hover:text-emerald-400 transition-colors">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
