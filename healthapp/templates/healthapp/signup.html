{% extends 'healthapp/base.html' %}
{% block container_class %}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center relative px-4">
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-cover bg-center bg-fixed bg-no-repeat" style="background-image: url('https://images.unsplash.com/photo-1511174511562-5f7f18b874f8?auto=format&fit=crop&q=80&w=2000');"></div>
        <!-- Dark Overlay -->
        <div class="absolute inset-0 bg-black/60"></div>
    </div>

    <!-- Signup Form Card -->
    <div class="w-full max-w-[450px] p-10 bg-black/40 backdrop-blur-md rounded-[40px] border border-white/20 shadow-2xl relative z-10 my-10">
        <!-- Icon -->
        <div class="mb-8 w-16 h-16 bg-gradient-to-br from-sky-400 to-indigo-500 rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/20 mx-auto text-black">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <line x1="19" y1="8" x2="19" y2="14" />
                <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
        </div>

        <h2 class="text-3xl font-black text-white tracking-tight mb-2 text-center">Create Account</h2>
        <p class="text-sm text-gray-300 mb-8 text-center">Join Smart Health to begin your journey.</p>

        <form class="space-y-5" method="POST">
            {% csrf_token %}

            <div class="space-y-2">
                <label for="username" class="text-xs font-bold text-gray-300 uppercase tracking-widest ml-1">Username</label>
                <input id="username" name="username" type="text" required
                    class="block w-full px-5 py-4 text-white bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all placeholder-gray-400"
                    placeholder="Choose a username">
            </div>

            <div class="space-y-2">
                <label for="email" class="text-xs font-bold text-gray-300 uppercase tracking-widest ml-1">Email Address</label>
                <input id="email" name="email" type="email" required
                    class="block w-full px-5 py-4 text-white bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all placeholder-gray-400"
                    placeholder="Enter your email">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label for="password1" class="text-xs font-bold text-gray-300 uppercase tracking-widest ml-1">Password</label>
                    <input id="password1" name="password1" type="password" required
                        class="block w-full px-5 py-3 text-white bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all placeholder-gray-400"
                        placeholder="••••••••">
                </div>
                <div class="space-y-2">
                    <label for="password2" class="text-xs font-bold text-gray-300 uppercase tracking-widest ml-1">Confirm</label>
                    <input id="password2" name="password2" type="password" required
                        class="block w-full px-5 py-3 text-white bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all placeholder-gray-400"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full mt-4 py-4 text-lg font-black text-black bg-gradient-to-r from-sky-400 to-indigo-400 rounded-2xl hover:scale-[1.02] shadow-[0_0_20px_rgba(56,189,248,0.3)] transition-all">
                Create Account →
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/20 text-center">
            <p class="text-sm text-gray-300">
                Already have an account?
                <a href="{% url 'login' %}"
                    class="font-bold text-white hover:text-sky-400 transition-colors">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
